        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {

        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
        }

        /* Nav Items */
        .nav-item {
            padding: 1rem 1.5rem;
            margin: 0.25rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
        }

        .nav-item:hover {
            background: #334155;
            color: var(--accent);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        .nav-divider {
            height: 1px;
            background: #334155;
            margin: 1rem 1.5rem;
        }

        /* Custom Scrollbar for better UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Grid Setup */
        #topicGrid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            padding-bottom: 2rem;
        }

        @media (max-width: 640px) {
            #topicGrid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .topic-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
        }

        .topic-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: #262f3f;
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.3);
        }

        #pageFrame {
            width: 100%;
            min-height: calc(100vh - 160px);
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: none;
        }

        @media (max-width: 768px) {
            #pageFrame {
                border-radius: 12px;
                min-height: calc(100vh - 140px);
            }
        }

        /* Language Switcher */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Physics Animation */
        .atom-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            pointer-events: none;
            opacity: 0.3;
        }
        .orbit {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid #38bdf844;
            border-radius: 50%;
            animation: rotate var(--d) linear infinite;
        }
        .electron {
            position: absolute;
            top: -5px; left: 50%;
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .atom-container { width: 200px; height: 200px; opacity: 0.15; }
        }

        .social-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            background: #334155;
            color: white;
            transition: transform 0.2s, background 0.2s;
        }
        .social-btn:hover {
            transform: translateY(-3px);
            background: var(--accent);
        }
        .whatsapp:hover { background: #25D366; }
        .telegram:hover { background: #0088cc; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            cursor: pointer;
            margin-bottom: 1.5rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .back-btn:hover { opacity: 0.8; }
    </style>
</head>

        let currentLang = 'ru';

        // --- Sidebar Logic for Mobile ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                // Open Menu
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                // Close Menu
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function closeSidebarOnMobile() {
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('-translate-x-full')) {
                    toggleSidebar();
                }
            }
        }

        function updateLanguage(lang) {
            currentLang = lang;
            
            // Sync switches
            document.getElementById('langSwitch').checked = (lang === 'kz');
            document.getElementById('langSwitchMobile').checked = (lang === 'kz');

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });
            
            if (currentView !== 'home') {
                if (currentView === 'grade') {
                    document.getElementById('currentSelectionTitle').innerText = translations[currentLang][`grade_${currentGrade}`];
                    renderTopicGrid(currentGrade);
                } else if (currentView === 'sor') {
                    document.getElementById('currentSelectionTitle').innerText = translations[currentLang].sor_soch;
                    renderSORHub();
                } else if (currentView === 'sor-grade') {
                    document.getElementById('currentSelectionTitle').innerText = `${translations[currentLang].sor_soch} — ${currentGrade} ${currentLang === 'ru' ? 'класс' : 'сынып'}`;
                    renderSORGradeMaterials(currentGrade);
                }
            }
        }

        const handleLangChange = function(e) {
            updateLanguage(e.target.checked ? 'kz' : 'ru');
        };

        document.getElementById('langSwitch').addEventListener('change', handleLangChange);
        document.getElementById('langSwitchMobile').addEventListener('change', handleLangChange);

        function loadGradeHub(grade, element) {
            closeSidebarOnMobile();
            currentView = 'grade';
            currentGrade = grade;
            setActive(element);

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('pageFrame').style.display = 'none';
            document.getElementById('selectionHeader').classList.remove('hidden');
            document.getElementById('backToHub').classList.add('hidden');
            document.getElementById('topicGrid').style.display = 'grid';

            document.getElementById('currentSelectionTitle').innerText = translations[currentLang][`grade_${grade}`];
            renderTopicGrid(grade);
        }

            document.getElementById('topicGrid').style.display = 'grid';

            document.getElementById('currentSelectionTitle').innerText = translations[currentLang].sor_soch;
            renderSORHub();
        }

        function renderSORHub() {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = '';
            ['7', '8', '9', '10', '11'].forEach(grade => {
                const card = document.createElement('div');
                card.className = 'topic-card group';
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-sky-500 uppercase tracking-widest">${translations[currentLang].sor_soch}</span>
                        <h3 class="text-xl font-bold mt-2 text-white">${translations[currentLang][`grade_${grade}`]}</h3>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-sm text-slate-400">
                        <span>${translations[currentLang].open} материалы</span>
                        <span class="text-sky-400 font-medium whitespace-nowrap">${translations[currentLang].open} <i class="fas fa-folder-open ml-1"></i></span>
                    </div>
                `;
                card.onclick = () => {
                    currentView = 'sor-grade';
                    currentGrade = grade;
                    loadSORGradeMaterials(grade);
                };
                grid.appendChild(card);
            });
        }

        function loadSORGradeMaterials(grade) {
            document.getElementById('currentSelectionTitle').innerText = `${translations[currentLang].sor_soch} — ${grade} ${currentLang === 'ru' ? 'класс' : 'сынып'}`;
            document.getElementById('backToHub').classList.remove('hidden');
            renderSORGradeMaterials(grade);
        }

        function renderSORGradeMaterials(grade) {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = '';
            
            const materials = sorMaterialsData[grade] || [];
            if (materials.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 px-4 text-slate-500"><i class="fas fa-file-excel text-4xl mb-4"></i><br>Материалы для ${grade} класса скоро будут добавлены.</div>`;
                return;
            }

            materials.forEach((mat, index) => {
                const card = document.createElement('div');
                card.className = 'topic-card group';
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-amber-500 uppercase tracking-widest">Document</span>
                        <h3 class="text-lg font-semibold mt-2 text-white leading-tight">${mat[currentLang]}</h3>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-sm text-slate-400">
                        <span class="bg-slate-800 px-2 py-1 rounded text-[10px] uppercase">Grade ${grade}</span>
                        <span class="text-sky-400 font-medium whitespace-nowrap">${translations[currentLang].open} <i class="fas fa-external-link-alt ml-1"></i></span>
                    </div>
                `;
                const folder = `mat ${grade} class`;
                card.onclick = () => loadLesson(folder, mat.file);
                grid.appendChild(card);
            });
        }

        function renderTopicGrid(grade) {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = '';
            const topics = gradeData[grade] || [];
            
            if (topics.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 px-4 text-slate-500"><i class="fas fa-tools text-4xl mb-4"></i><br>Материалы для этого класса скоро появятся.</div>`;

            }

            topics.forEach((topic, index) => {
                const card = document.createElement('div');
                card.className = 'topic-card group';
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-sky-500 uppercase tracking-widest">${translations[currentLang].lesson} ${index + 1}</span>
                        <h3 class="text-lg font-semibold mt-2 text-white leading-tight group-hover:text-sky-300 transition-colors">${topic[currentLang]}</h3>

                        <span class="text-sky-400 font-medium whitespace-nowrap">${translations[currentLang].open} <i class="fas fa-arrow-right ml-1 group-hover:translate-x-1 transition-transform"></i></span>
                    </div>
                `;
                card.onclick = () => loadLesson(`${grade} class`, topic.file);
                grid.appendChild(card);

        function loadLesson(folder, fileName) {
            document.getElementById('topicGrid').style.display = 'none';
            document.getElementById('selectionHeader').classList.add('hidden');
            const frame = document.getElementById('pageFrame');
            frame.style.display = 'block';
            
            frame.src = `${folder}/${fileName}`;
        }

        function setActive(element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (element) element.classList.add('active');
        }

        function goHome() {
            closeSidebarOnMobile();
            currentView = 'home';
            setActive(null);
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('topicGrid').style.display = 'none';
            document.getElementById('selectionHeader').classList.add('hidden');
            document.getElementById('pageFrame').style.display = 'none';
