        :root {
            --bg-dark: #0f172a;
            --accent: #38bdf8;
            --sidebar-bg: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            margin: 0;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 50;
        }

        .nav-item {
            padding: 1rem 1.5rem;
            margin: 0.25rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
        }

        .nav-item:hover {
            background: #334155;
            color: var(--accent);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        .nav-divider {
            height: 1px;
            background: #334155;
            margin: 1rem 1.5rem;
        }

        /* Top Bar */
        header {
            height: 70px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            position: fixed;
            top: 0;
            right: 0;
            left: 280px;
            z-index: 40;
        }

        /* Main Content */
        main {
            margin-top: 70px;
            flex-grow: 1;
            padding: 2rem;
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #pageFrame {
            width: 100%;
            height: calc(100vh - 180px);
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: none;
        }

        /* Topic Grid */
        #topicGrid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            padding-bottom: 60px;
        }

        .topic-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
        }

        .topic-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: #262f3f;
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.3);
        }

        /* Language Switcher */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Physics Animation */
        .atom-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            pointer-events: none;
            opacity: 0.3;
        }
        .orbit {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid #38bdf844;
            border-radius: 50%;
            animation: rotate var(--d) linear infinite;
        }
        .electron {
            position: absolute;
            top: -5px; left: 50%;
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .social-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            background: #334155;
            color: white;
            transition: transform 0.2s, background 0.2s;
        }
        .social-btn:hover {
            transform: translateY(-3px);
            background: var(--accent);
        }
        .whatsapp:hover { background: #25D366; }
        .telegram:hover { background: #0088cc; }

        footer {

            bottom: 0;
            left: 280px;
            right: 0;

            background: var(--bg-dark);
            border-top: 1px solid #334155;
            font-size: 0.85rem;
            color: #64748b;
            display: flex;
            justify-content: center;

        .back-btn {

            gap: 8px;
            color: var(--accent);
            cursor: pointer;
            margin-bottom: 1.5rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .back-btn:hover { opacity: 0.8; }
    </style>
</head>

                { file: "page 831.html", ru: "Сферические зеркала", kz: "Сфералық айналар" },
                { file: "page 832.html", ru: "Преломление света. Полное внутреннее отражение", kz: "Жарықтың сынуы. Толық ішкі шағылу" },
                { file: "page 833.html", ru: "Линзы. Формула тонкой линзы", kz: "Линзалар. Жұқа линзаның формуласы" },
                { file: "page 834.html", ru: "Глаз как оптическая система. Оптические приборы", kz: "Көз оптикалық жүйе ретінде. Оптикалық құралдар" }
            ],
            '9': [
                { file: "page 901.html", ru: "Вводный инструктаж по ТБ. Механическое движение. Материальная точка", kz: "ҚТ бойынша кіріспе нұсқама. Механикалық қозғалыс. Материялық нүкте" }
            ],
            '10': [
                { file: "page 1001.html", ru: "Погрешности физических величин. Обработка результатов измерений", kz: "Физикалық шамалардың қателіктері. Өлшеу нәтижелерін өңдеу" }
            ]
        };

        const sorMaterialsData = {
            '7': [
                { file: "mat 71 class.html", ru: "СОР/СОЧ за 1 четверть", kz: "1-тоқсан БЖБ/ТЖБ" },
                { file: "mat 72 class.html", ru: "СОР/СОЧ за 2 четверть", kz: "2-тоқсан БЖБ/ТЖБ" },
                { file: "mat 73 class.html", ru: "СОР/СОЧ за 3 четверть", kz: "3-тоқсан БЖБ/ТЖБ" },
                { file: "mat 74 class.html", ru: "СОР/СОЧ за 4 четверть", kz: "4-тоқсан БЖБ/ТЖБ" }
            ],
            '8': [
                { file: "mat 81 class.html", ru: "СОР/СОЧ за 1 четверть", kz: "1-тоқсан БЖБ/ТЖБ" },
                { file: "mat 82class.html", ru: "СОР/СОЧ за 2 четверть", kz: "2-тоқсан БЖБ/ТЖБ" },
                { file: "mat 83 class.html", ru: "СОР/СОЧ за 3 четверть", kz: "3-тоқсан БЖБ/ТЖБ" },
                { file: "mat 84 class.html", ru: "СОР/СОЧ за 4 четверть", kz: "4-тоқсан БЖБ/ТЖБ" }
            ],
            '9': [],
            '10': [
                { file: "mat 1001.html", ru: "СОР/СОЧ за 1 четверть", kz: "1-тоқсан БЖБ/ТЖБ" }
            ],
            '11': []
        };

        let currentLang = 'ru';
        let currentView = 'home'; // 'home', 'grade', 'sor', 'sor-grade'
        let currentGrade = null;

        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
            
            // Обновляем текущий заголовок, если мы не на главной
            if (currentView !== 'home') {
                if (currentView === 'grade') {
                    document.getElementById('currentSelectionTitle').innerText = translations[currentLang][`grade_${currentGrade}`];
                    renderTopicGrid(currentGrade);
                } else if (currentView === 'sor') {
                    document.getElementById('currentSelectionTitle').innerText = translations[currentLang].sor_soch;
                    renderSORHub();
                } else if (currentView === 'sor-grade') {
                    document.getElementById('currentSelectionTitle').innerText = `${translations[currentLang].sor_soch} — ${currentGrade} ${currentLang === 'ru' ? 'класс' : 'сынып'}`;
                    renderSORGradeMaterials(currentGrade);
                }
            }
        }

        document.getElementById('langSwitch').addEventListener('change', function(e) {
            updateLanguage(e.target.checked ? 'kz' : 'ru');
        });

        function loadGradeHub(grade, element) {
            currentView = 'grade';
            currentGrade = grade;
            setActive(element);

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('pageFrame').style.display = 'none';
            document.getElementById('selectionHeader').classList.remove('hidden');
            document.getElementById('backToHub').classList.add('hidden');
            document.getElementById('topicGrid').style.display = 'grid';

            document.getElementById('currentSelectionTitle').innerText = translations[currentLang][`grade_${grade}`];
            renderTopicGrid(grade);
        }

        function loadSORSOCHHub(element) {
            currentView = 'sor';
            setActive(element);

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('pageFrame').style.display = 'none';
            document.getElementById('selectionHeader').classList.remove('hidden');
            document.getElementById('backToHub').classList.add('hidden');
            document.getElementById('topicGrid').style.display = 'grid';

            document.getElementById('currentSelectionTitle').innerText = translations[currentLang].sor_soch;
            renderSORHub();
        }

        function renderSORHub() {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = '';
            ['7', '8', '9', '10', '11'].forEach(grade => {
                const card = document.createElement('div');
                card.className = 'topic-card group';
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-sky-500 uppercase tracking-widest">${translations[currentLang].sor_soch}</span>
                        <h3 class="text-xl font-bold mt-2 text-white">${translations[currentLang][`grade_${grade}`]}</h3>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-sm text-slate-400">
                        <span>Открыть материалы</span>
                        <span class="text-sky-400 font-medium">${translations[currentLang].open} <i class="fas fa-folder-open ml-1"></i></span>
                    </div>
                `;
                card.onclick = () => {
                    currentView = 'sor-grade';
                    currentGrade = grade;
                    loadSORGradeMaterials(grade);
                };
                grid.appendChild(card);
            });
        }

        function loadSORGradeMaterials(grade) {
            document.getElementById('currentSelectionTitle').innerText = `${translations[currentLang].sor_soch} — ${grade} ${currentLang === 'ru' ? 'класс' : 'сынып'}`;
            document.getElementById('backToHub').classList.remove('hidden');
            renderSORGradeMaterials(grade);
        }

        function renderSORGradeMaterials(grade) {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = '';
            
            const materials = sorMaterialsData[grade] || [];
            if (materials.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center p-20 text-slate-500"><i class="fas fa-file-excel text-4xl mb-4"></i><br>Материалы для ${grade} класса скоро будут добавлены.</div>`;
                return;
            }

            materials.forEach((mat, index) => {
                const card = document.createElement('div');
                card.className = 'topic-card group';
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-amber-500 uppercase tracking-widest">Document</span>
                        <h3 class="text-lg font-semibold mt-2 text-white leading-tight">${mat[currentLang]}</h3>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-sm text-slate-400">
                        <span class="bg-slate-800 px-2 py-1 rounded text-[10px] uppercase">Grade ${grade}</span>
                        <span class="text-sky-400 font-medium">${translations[currentLang].open} <i class="fas fa-external-link-alt ml-1"></i></span>
                    </div>
                `;
                const folder = `mat ${grade} class`;
                card.onclick = () => loadLesson(folder, mat.file);
                grid.appendChild(card);
            });
        }

        function renderTopicGrid(grade) {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = '';
            const topics = gradeData[grade] || [];
            
            if (topics.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center p-20 text-slate-500"><i class="fas fa-tools text-4xl mb-4"></i><br>Материалы для этого класса скоро появятся.</div>`;
                return;
            }

            topics.forEach((topic, index) => {
                const card = document.createElement('div');
                card.className = 'topic-card group';
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-sky-500 uppercase tracking-widest">${translations[currentLang].lesson} ${index + 1}</span>
                        <h3 class="text-lg font-semibold mt-2 text-white leading-tight group-hover:text-sky-300 transition-colors">${topic[currentLang]}</h3>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-sm text-slate-400">
                        <span class="bg-slate-800 px-2 py-1 rounded text-[10px] uppercase">Grade ${grade}</span>
                        <span class="text-sky-400 font-medium">${translations[currentLang].open} <i class="fas fa-arrow-right ml-1 group-hover:translate-x-1 transition-transform"></i></span>
                    </div>
                `;
                card.onclick = () => loadLesson(`${grade} class`, topic.file);
                grid.appendChild(card);
            });
        }

        function loadLesson(folder, fileName) {
            document.getElementById('topicGrid').style.display = 'none';
            document.getElementById('selectionHeader').classList.add('hidden');
            const frame = document.getElementById('pageFrame');
            frame.style.display = 'block';
            
            // Возвращаем обычные пути без encodeURI (для корректной работы из локальных папок на ПК)
            frame.src = `${folder}/${fileName}`;
        }

        function setActive(element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (element) element.classList.add('active');
        }

        function goHome() {
            currentView = 'home';
            setActive(null);
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('topicGrid').style.display = 'none';
            document.getElementById('selectionHeader').classList.add('hidden');
            document.getElementById('pageFrame').style.display = 'none';
        }
    </script>
</body>
</html>
