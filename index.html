<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR'S Academy — Physics Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-dark: #0f172a;
            --accent: #38bdf8;
            --sidebar-bg: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            margin: 0;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 50;
        }

        .nav-item {
            padding: 1rem 1.5rem;
            margin: 0.25rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
        }

        .nav-item:hover {
            background: #334155;
            color: var(--accent);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        /* Top Bar */
        header {
            height: 70px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            position: fixed;
            top: 0;
            right: 0;
            left: 280px;
            z-index: 40;
        }

        /* Main Content */
        main {
            margin-top: 70px;
            flex-grow: 1;
            padding: 2rem;
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #pageFrame {
            width: 100%;
            height: calc(100vh - 180px);
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: none;
        }

        /* Topic Grid */
        #topicGrid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            padding-bottom: 60px;
        }

        .topic-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
        }

        .topic-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: #262f3f;
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.3);
        }

        /* Language Switcher */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Physics Animation (Floating Atoms) */
        .atom-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            pointer-events: none;
            opacity: 0.3;
        }
        .orbit {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid #38bdf844;
            border-radius: 50%;
            animation: rotate var(--d) linear infinite;
        }
        .electron {
            position: absolute;
            top: -5px; left: 50%;
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .social-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            background: #334155;
            color: white;
            transition: transform 0.2s, background 0.2s;
        }
        .social-btn:hover {
            transform: translateY(-3px);
            background: var(--accent);
        }
        .whatsapp:hover { background: #25D366; }
        .telegram:hover { background: #0088cc; }

        footer {
            position: fixed;
            bottom: 0;
            left: 280px;
            right: 0;
            padding: 1rem 2rem;
            background: var(--bg-dark);
            border-top: 1px solid #334155;
            font-size: 0.85rem;
            color: #64748b;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside id="sidebar">
        <div class="p-8">
            <h1 class="text-2xl font-bold text-white tracking-wider cursor-pointer" onclick="goHome()">STAR'S <span class="text-sky-400">ACADEMY</span></h1>
            <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest" data-i18n="platform_desc">Онлайн платформа</p>
        </div>

        <nav class="flex-grow">
            <div class="nav-item" onclick="loadGradeHub('7', this)">
                <i class="fas fa-microscope"></i>
                <span data-i18n="grade_7">7 класс</span>
            </div>
            <div class="nav-item" onclick="loadGradeHub('8', this)">
                <i class="fas fa-bolt"></i>
                <span data-i18n="grade_8">8 класс</span>
            </div>
            <div class="nav-item" onclick="loadGradeHub('9', this)">
                <i class="fas fa-magnet"></i>
                <span data-i18n="grade_9">9 класс</span>
            </div>
            <div class="nav-item" onclick="loadGradeHub('10', this)">
                <i class="fas fa-atom"></i>
                <span data-i18n="grade_10">10 класс</span>
            </div>
            <div class="nav-item" onclick="loadGradeHub('11', this)">
                <i class="fas fa-rocket"></i>
                <span data-i18n="grade_11">11 класс</span>
            </div>
        </nav>
    </aside>

    <!-- HEADER -->
    <header>
        <div class="flex items-center gap-4">
            <span class="text-sm font-semibold">RU</span>
            <label class="switch">
                <input type="checkbox" id="langSwitch">
                <span class="slider"></span>
            </label>
            <span class="text-sm font-semibold">KZ</span>
        </div>

        <div class="flex gap-3">
            <a href="https://wa.me/message/CRHNZRLA3HFQK1" target="_blank" class="social-btn whatsapp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="https://t.me/zhukazhan" target="_blank" class="social-btn telegram">
                <i class="fab fa-telegram-plane"></i>
            </a>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="mainContent">
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center py-10">
            <div class="atom-container">
                <div class="orbit" style="--d: 8s; transform: rotateX(70deg) rotateY(10deg);"><div class="electron"></div></div>
                <div class="orbit" style="--d: 12s; transform: rotateX(10deg) rotateY(70deg);"><div class="electron"></div></div>
                <div class="orbit" style="--d: 10s; transform: rotateX(45deg) rotateY(45deg);"><div class="electron"></div></div>
            </div>
            <h2 class="text-5xl font-bold mb-4" data-i18n="welcome_title">Изучай физику со звездами</h2>
            <p class="text-xl text-slate-400 max-w-lg mx-auto" data-i18n="welcome_subtitle">Интерактивные уроки и задачи для учеников 7-11 классов</p>
            <button class="mt-8 px-8 py-3 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-full transition-all shadow-lg shadow-sky-500/20" data-i18n="start_btn" onclick="loadGradeHub('7', document.querySelector('.nav-item'))">
                Начать обучение
            </button>
        </div>

        <!-- Grade Selection Grid -->
        <div id="gradeHeader" class="hidden mb-8">
            <h2 class="text-3xl font-bold text-white mb-2" id="currentGradeTitle"></h2>
            <p class="text-slate-400" data-i18n="select_topic">Выберите тему для изучения</p>
        </div>
        <div id="topicGrid"></div>

        <!-- Lesson Viewer -->
        <iframe id="pageFrame"></iframe>
    </main>

    <!-- FOOTER -->
    <footer>
        <p><span data-i18n="developer">Разработчик</span>: <strong>zhuldyzdaryn@gmail.com</strong></p>
    </footer>

    <script>
        const translations = {
            ru: {
                platform_desc: "Онлайн платформа",
                grade_7: "7 класс",
                grade_8: "8 класс",
                grade_9: "9 класс",
                grade_10: "10 класс",
                grade_11: "11 класс",
                welcome_title: "Изучай физику со звездами",
                welcome_subtitle: "Интерактивные уроки и задачи для учеников 7-11 классов",
                start_btn: "Начать обучение",
                developer: "Разработчик",
                select_topic: "Выберите тему для изучения",
                lesson: "Урок",
                open: "Открыть"
            },
            kz: {
                platform_desc: "Онлайн платформасы",
                grade_7: "7 сынып",
                grade_8: "8 сынып",
                grade_9: "9 сынып",
                grade_10: "10 сынып",
                grade_11: "11 сынып",
                welcome_title: "Физиканы жұлдыздармен бірге оқы",
                welcome_subtitle: "7-11 сынып оқушыларына арналған интерактивті сабақтар мен тапсырмалар",
                start_btn: "Оқуды бастау",
                developer: "Әзірлеуші",
                select_topic: "Зерттеу тақырыбын таңдаңыз",
                lesson: "Сабақ",
                open: "Ашу"
            }
        };

        // База данных тем для 7 класса (включает ВСЕ ваши файлы)
        const gradeData = {
            '7': [
                { file: "page 711.html", ru: "Физика: Фундаментальная наука о природе", kz: "Физика: Табиғат туралы іргелі ғылым" },
                { file: "page 712.html", ru: "СИ, Скаляры и Векторы", kz: "ХБЖ, Скалярлар және векторлар" },
                { file: "page 713.html", ru: "Точность измерений и погрешность", kz: "Өлшеу дәлдігі мен қателік" },
                { file: "page 714.html", ru: "Запись больших и малых чисел", kz: "Үлкен және кіші сандарды жазу" },
                { file: "page 715.html", ru: "Механическое движение", kz: "Механикалық қозғалыс" },
                { file: "page 716.html", ru: "Относительность движения", kz: "Қозғалыс салыстырмалылығы" },
                { file: "page 717.html", ru: "Расчет скорости и средней скорости", kz: "Жылдамдық пен орташа жылдамдықты есептеу" },
                { file: "page 718.html", ru: "Графическое представление движения", kz: "Қозғалыстың графикалық берілуі" },
                { file: "page 719.html", ru: "Итоговое тестирование по главе 1", kz: "1-тарау бойынша қорытынды тест" },
                { file: "page 7120.html", ru: "Лабораторная работа: Плотность и объем", kz: "Зертханалық жұмыс: Тығыздық пен көлем" },
                { file: "page 7121.html", ru: "Явление инерции. Масса тел", kz: "Инерция құбылысы. Денелердің массасы" },
                { file: "page 7122.html", ru: "Плотность вещества", kz: "Заттың тығыздығы" },
                { file: "page 7123.html", ru: "Деформация и её виды", kz: "Деформация және оның түрлері" },
                { file: "page 7124.html", ru: "Сила упругости. Закон Гука", kz: "Серпімділік күші. Гук заңы" },
                { file: "page7125.html", ru: "Сила трения. Учет трения в технике", kz: "Үйкеліс күші. Техникада үйкелісті ескеру" },
                { file: "page 7126.html", ru: "Сложение сил, действующих на тело", kz: "Денеге әсер ететін күштерді қосу" },
                { file: "page7127.html", ru: "Молекулярное строение тел", kz: "Денелердің молекулалық құрылымы" },
                { file: "page7128.html", ru: "Давление твердых тел", kz: "Қатты денелердің қысымы" },
                { file: "page7129.html", ru: "Давление в жидкостях и газах. Закон Паскаля", kz: "Сұйықтар мен газдардағы қысым. Паскаль заңы" },
                { file: "page 7130.html", ru: "Сообщающиеся сосуды", kz: "Қатынас ыдыстар" },
                { file: "page7131.html", ru: "Атмосферное давление", kz: "Атмосфералық қысым" },
                { file: "page7132.html", ru: "Манометры, насосы. Выталкивающая сила", kz: "Манометрлер, сорғылар. Көтеруші күш" },
                { file: "page7133.html", ru: "Механическая работа. Мощность", kz: "Механикалық жұмыс. Қуат" },
                { file: "page7134.html", ru: "Коэффициент полезного действия (КПД)", kz: "Пайдалы әрекет коэффициенті (ПӘК)" },
                { file: "page7135.html", ru: "Кинетическая и потенциальная энергия", kz: "Кинетикалық және потенциалдық энергия" },
                { file: "page7136.html", ru: "Превращение и сохранение энергии", kz: "Энергияның түрленуі және сақталуы" },
                { file: "page7138.html", ru: "Простые механизмы", kz: "Жай механизмдер" },
                { file: "page7139.html", ru: "Наука о небесных телах. Солнечная система", kz: "Аспан денелері туралы ғылым. Күн жүйесі" },
                { file: "page7140.html", ru: "Основы календаря (сутки, месяц, год)", kz: "Күнтізбе негіздері (тәулік, ай, жыл)" }
            ],
            '8': [], '9': [], '10': [], '11': []
        };

        let currentLang = 'ru';

        function updateLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
            const activeGrade = document.querySelector('.nav-item.active');
            if(activeGrade) {
                const gradeNum = activeGrade.innerText.match(/\d+/)[0];
                renderTopicGrid(gradeNum);
            }
        }

        document.getElementById('langSwitch').addEventListener('change', function(e) {
            updateLanguage(e.target.checked ? 'kz' : 'ru');
        });

        function loadGradeHub(grade, element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('pageFrame').style.display = 'none';
            document.getElementById('gradeHeader').classList.remove('hidden');
            document.getElementById('topicGrid').style.display = 'grid';

            document.getElementById('currentGradeTitle').innerText = translations[currentLang][`grade_${grade}`];
            renderTopicGrid(grade);
        }

        function renderTopicGrid(grade) {
            const grid = document.getElementById('topicGrid');
            grid.innerHTML = '';
            
            const topics = gradeData[grade] || [];
            
            if (topics.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center p-20 text-slate-500"><i class="fas fa-tools text-4xl mb-4"></i><br>Материалы для этого класса скоро появятся.</div>`;
                return;
            }

            topics.forEach((topic, index) => {
                const card = document.createElement('div');
                card.className = 'topic-card group';
                card.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-sky-500 uppercase tracking-widest">${translations[currentLang].lesson} ${index + 1}</span>
                        <h3 class="text-lg font-semibold mt-2 text-white leading-tight group-hover:text-sky-300 transition-colors">${topic[currentLang]}</h3>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-sm text-slate-400">
                        <span class="bg-slate-800 px-2 py-1 rounded text-[10px] uppercase">Grade ${grade}</span>
                        <span class="text-sky-400 font-medium">${translations[currentLang].open} <i class="fas fa-arrow-right ml-1 group-hover:translate-x-1 transition-transform"></i></span>
                    </div>
                `;
                card.onclick = () => loadLesson(grade, topic.file);
                grid.appendChild(card);
            });
        }

        function loadLesson(grade, fileName) {
            document.getElementById('topicGrid').style.display = 'none';
            document.getElementById('gradeHeader').classList.add('hidden');
            const frame = document.getElementById('pageFrame');
            frame.style.display = 'block';
            
            // Загружаем файл из папки "7 class" (или другого класса)
            frame.src = `${grade} class/${fileName}`;
        }

        function goHome() {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('topicGrid').style.display = 'none';
            document.getElementById('gradeHeader').classList.add('hidden');
            document.getElementById('pageFrame').style.display = 'none';
        }
    </script>
</body>
</html>
